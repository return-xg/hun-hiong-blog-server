# ============================
# hun-hiong-blog-server
# ============================
server:
  port: ${SERVER_PORT:8080}
  servlet:
    context-path: /
    encoding:
      charset: UTF-8
      enabled: true
      force: true
  tomcat:
    uri-encoding: UTF-8
    max-threads: 200
    accept-count: 100

spring:
  application:
    name: hun-hiong-blog-server
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}

  # Jackson
  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: GMT+8
    default-property-inclusion: non_null

  # PostgreSQL
  datasource:
    driver-class-name: org.postgresql.Driver
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:hun_hiong_blog}?stringtype=unspecified
    username: ${DB_USERNAME:}
    password: ${DB_PASSWORD:}
    hikari:
      pool-name: BlogHikariPool
      minimum-idle: 5
      maximum-pool-size: 20
      idle-timeout: 30000
      max-lifetime: 1800000
      connection-timeout: 30000
      connection-test-query: SELECT 1

  # Redis
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      database: ${REDIS_DATABASE:0}
      timeout: 5000ms
      lettuce:
        pool:
          max-active: 16
          max-idle: 8
          min-idle: 2
          max-wait: 3000ms

  # MVC
  mvc:
    pathmatch:
      matching-strategy: ant_path_matcher

# ============================
# MyBatis-Plus
# ============================
mybatis-plus:
  mapper-locations: classpath*:/mapper/**/*.xml
  type-aliases-package: com.hunhiong.blog.entity
  configuration:
    map-underscore-to-camel-case: true
    cache-enabled: false
    # 开发环境可打印 SQL（生产环境关闭）
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    banner: false
    db-config:
      id-type: assign_id
      # 逻辑删除字段
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0
      # 主键表前缀（可选）
      table-underline: true

# ============================
# JWT
# ============================
jwt:
  # 密钥请通过环境变量注入，生产环境务必更换（≥32 字符）
  secret: ${JWT_SECRET:}
  # Access Token 有效期（秒）默认 2 小时
  access-token-expiration: ${JWT_ACCESS_EXPIRATION:7200}
  # Refresh Token 有效期（秒）默认 7 天
  refresh-token-expiration: ${JWT_REFRESH_EXPIRATION:604800}
  # Token 请求头
  header: Authorization
  # Token 前缀
  prefix: "Bearer "

# ============================
# Knife4j / SpringDoc
# ============================
springdoc:
  api-docs:
    enabled: true
    path: /v3/api-docs
  swagger-ui:
    enabled: true
    path: /swagger-ui.html
  default-flat-param-object: true

knife4j:
  enable: true
  setting:
    language: zh_cn
    enable-footer: false
    enable-document: true

# ============================
# 日志
# ============================
logging:
  level:
    root: ${LOG_ROOT:INFO}
    com.hunhiong.blog: ${LOG_APP:DEBUG}
    org.springframework.web: INFO
    org.springframework.security: INFO
    com.baomidou.mybatisplus: WARN
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n"
  file:
    name: logs/hun-hiong-blog-server.log
  logback:
    rollingpolicy:
      max-file-size: 50MB
      max-history: 30
      total-size-cap: 1GB
